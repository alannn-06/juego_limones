<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caza Estrellas</title>
  <link rel="stylesheet" href="limones.css">
  <script src="utils.js"></script>
</head>

<body onload="iniciar()">
  <div class="contenedor">

    <header class="header">
      <h1>🍋 Atrapar Limones</h1>
      <p class="subtitulo">Si del cielo te caen limones...</p>
      <h2 class="autor">Autor: Alan Chanatasig</h2>
    </header>

    <section class="juego">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="card">
        <span>Puntaje</span>
        <strong id="txtPuntaje">0</strong>
      </div>

      <div class="card">
        <span>Vidas</span>
        <strong id="txtVidas">3</strong>
      </div>
    </section>

    <section class="botones">
      <button onclick="moverIzquierda()">⬅ Izquierda</button>
      <button onclick="moverDerecha()">Derecha ➡</button>
      <button class="btn-reiniciar" onclick="reiniciar()">🔄 Reiniciar</button>
    </section>

  </div>

  <script src="limones.js"></script>
</body>
</html>
