<!DOCTYPE html>
<html lang="es">

  <script src="utils.js"></script>
</head>

<body onload="iniciar()">
  <div class="contenedor">

    <p class="subtitulo">>> SI DEL CIELO TE CAEN LIMONES...</p>
    <h2 class="autor">[ ALAN CHANATASIG ]</h2>

    <canvas id="areaJuego" width="600" height="400"></canvas>

    <div class="botones">

  </div>
